<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Invoice</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0A0A0A;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
.container{width:100%;max-width:480px}
.logo{text-align:center;padding:32px 0 24px}
.logo-name{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;color:#F59E0B;letter-spacing:0.12em;text-shadow:0 0 20px rgba(245,158,11,0.4)}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:0.15em;text-transform:uppercase;margin-top:4px}
.card{background:linear-gradient(165deg,#1C1C20,#111113);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:24px;margin-bottom:16px;box-shadow:inset 0 0 30px rgba(245,158,11,0.05),0 15px 40px rgba(0,0,0,0.4)}
.row{display:flex;justify-content:space-between;align-items:center}
.label{font-family:'Oswald',sans-serif;font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:0.12em;text-transform:uppercase}
.inv-num{font-family:'JetBrains Mono',monospace;font-size:22px;color:#fff;margin-top:4px}
.client-name{font-size:16px;color:#fff}
.meta{font-size:11px;color:rgba(255,255,255,0.4)}
.divider{height:1px;background:rgba(255,255,255,0.06);margin:16px 0}
.line-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px}
.line-desc{flex:1;color:#fff}
.line-qty{color:rgba(255,255,255,0.4);margin:0 12px;font-size:12px}
.line-amt{font-family:'JetBrains Mono',monospace;color:#fff}
.total-row{display:flex;justify-content:space-between;padding:16px 0 0;margin-top:8px;border-top:1px solid rgba(255,255,255,0.08)}
.total-label{font-family:'Oswald',sans-serif;font-size:14px;color:#F59E0B;letter-spacing:0.08em}
.total-amt{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#F59E0B;text-shadow:0 0 15px rgba(245,158,11,0.4)}
.progress{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-top:12px}
.progress-fill{height:100%;background:linear-gradient(90deg,#22C55E,#06B6D4);border-radius:3px;box-shadow:0 0 8px rgba(34,197,94,0.4);transition:width 1s ease}
.pay-btn{width:100%;padding:16px;border:none;border-radius:12px;background:linear-gradient(135deg,#22C55E,#16A34A);color:#fff;font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;letter-spacing:0.1em;cursor:pointer;box-shadow:0 8px 32px rgba(34,197,94,0.3);transition:all 0.15s;margin-bottom:16px}
.pay-btn:hover{box-shadow:0 8px 40px rgba(34,197,94,0.5);transform:translateY(-1px)}
.pay-btn:active{transform:scale(0.98)}
.pay-btn.paid{background:linear-gradient(135deg,#374151,#1F2937);cursor:default;box-shadow:none}
.notes{font-size:12px;color:rgba(255,255,255,0.4);padding:16px;background:rgba(255,255,255,0.02);border-radius:8px;line-height:1.6}
.status-badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
.status-paid{background:rgba(34,197,94,0.15);color:#22C55E;border:1px solid rgba(34,197,94,0.3)}
.status-due{background:rgba(245,158,11,0.15);color:#F59E0B;border:1px solid rgba(245,158,11,0.3)}
.status-overdue{background:rgba(239,68,68,0.15);color:#EF4444;border:1px solid rgba(239,68,68,0.3)}
.footer{text-align:center;padding:24px 0;font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:0.05em}
.powered{color:rgba(245,158,11,0.3)}
.loading{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.4)}
.error{text-align:center;padding:60px 20px;color:#EF4444}
</style>
</head>
<body>
<div class="container" id="portal">
  <div class="loading">Loading invoice...</div>
</div>

<script>
// Extract token from URL
const params = new URLSearchParams(window.location.search);
const token = params.get('t');

if(!token){
  document.getElementById('portal').innerHTML = '<div class="error">Invalid invoice link</div>';
} else {
  loadInvoice(token);
}

function loadInvoice(token){
  // Try localStorage first (same device)
  const raw = localStorage.getItem('scV12');
  if(raw){
    try {
      const S = JSON.parse(raw);
      const inv = (S.invoices||[]).find(i => i.portalToken === token);
      if(inv){
        // Mark as viewed
        if(inv.status === 'sent'){
          inv.status = 'viewed';
          inv.viewedAt = new Date().toISOString();
          localStorage.setItem('scV12', JSON.stringify(S));
        }
        renderPortal(inv, S);
        return;
      }
    } catch(e){}
  }

  // Try Supabase (when cloud is live)
  // For now, show instructions
  document.getElementById('portal').innerHTML = `
    <div class="logo">
      <div class="logo-name">HELIX</div>
      <div class="logo-sub">Invoice Portal</div>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:12px">Invoice not found on this device</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.3);line-height:1.6">
        This invoice link requires cloud sync to view from another device.
        When Supabase is connected, invoices will be viewable from any browser.
      </div>
    </div>
  `;
}

function renderPortal(inv, S){
  const client = (S.prospects||[]).find(p => p.id === inv.clientId) || {};
  const bizName = (S.financialSettings||{}).businessName || (S.config||{}).businessName || 'Business';
  const items = inv.items || [];
  const paid = inv.amountPaid || 0;
  const total = inv.total || inv.subtotal || 0;
  const due = Math.max(0, total - paid);
  const paidPct = total > 0 ? Math.min(100, (paid/total)*100) : 0;
  const isPaid = inv.status === 'paid' || due <= 0;
  const isOverdue = !isPaid && inv.dueDate && new Date(inv.dueDate) < new Date();

  const fmt = (n) => '$' + Math.abs(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const esc = (s) => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  document.title = 'Invoice #' + (inv.number||'') + ' — ' + bizName;

  document.getElementById('portal').innerHTML = `
    <div class="logo">
      <div class="logo-name">${esc(bizName)}</div>
      <div class="logo-sub">Invoice</div>
    </div>

    <div class="card">
      <div class="row" style="margin-bottom:16px">
        <div>
          <div class="label">Invoice</div>
          <div class="inv-num">#${esc(inv.number||'')}</div>
        </div>
        <div style="text-align:right">
          <div class="label">Bill To</div>
          <div class="client-name">${esc(client.biz||client.name||'Client')}</div>
          ${client.email ? '<div class="meta">'+esc(client.email)+'</div>' : ''}
        </div>
      </div>

      <div class="row meta" style="margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.06)">
        <span>Date: ${inv.created ? new Date(inv.created).toLocaleDateString() : '—'}</span>
        <span>Due: ${inv.dueDate||'—'}</span>
        <span class="status-badge ${isPaid?'status-paid':isOverdue?'status-overdue':'status-due'}">${isPaid?'PAID':isOverdue?'OVERDUE':'DUE'}</span>
      </div>

      ${items.map(li => `
        <div class="line-item">
          <div class="line-desc">${esc(li.description||li.name||'Item')}</div>
          <div class="line-qty">${li.quantity||1} × ${fmt(li.rate||li.price||0)}</div>
          <div class="line-amt">${fmt((li.quantity||1)*(li.rate||li.price||0))}</div>
        </div>
      `).join('') || '<div class="meta" style="padding:12px 0">No line items</div>'}

      ${inv.taxAmount && inv.taxAmount > 0 ? `
        <div class="line-item" style="border:none">
          <div class="line-desc meta">Tax (${inv.taxRate||0}%)</div>
          <div class="line-amt meta">${fmt(inv.taxAmount)}</div>
        </div>
      ` : ''}

      ${inv.discountAmount && inv.discountAmount > 0 ? `
        <div class="line-item" style="border:none">
          <div class="line-desc meta">Discount</div>
          <div class="line-amt meta">-${fmt(inv.discountAmount)}</div>
        </div>
      ` : ''}

      <div class="total-row">
        <div class="total-label">TOTAL</div>
        <div class="total-amt">${fmt(total)}</div>
      </div>

      ${paid > 0 && !isPaid ? `
        <div style="margin-top:16px">
          <div class="row meta" style="margin-bottom:4px">
            <span style="color:#22C55E">Paid: ${fmt(paid)}</span>
            <span style="color:#F59E0B">Remaining: ${fmt(due)}</span>
          </div>
          <div class="progress">
            <div class="progress-fill" style="width:${paidPct}%"></div>
          </div>
        </div>
      ` : ''}
    </div>

    ${!isPaid ? `
      <button class="pay-btn" onclick="handlePay()">
        PAY ${fmt(due)}
      </button>
    ` : `
      <button class="pay-btn paid">✓ PAID IN FULL</button>
    `}

    ${inv.notes ? '<div class="notes">'+esc(inv.notes)+'</div>' : ''}

    <div class="footer">
      Powered by <span class="powered">HELIX</span> · Secure Invoice Portal
    </div>
  `;
}

function handlePay(){
  // Stub — Stripe integration goes here
  alert('Online payment coming soon. Please contact the business directly to arrange payment.');
}
</script>
</body>
</html>
